<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縁の鑑定書</title>
<style>
  :root {
    --washi: #f7f2e7;
    --washi-field: #fffdf8;
    --gold: #c9b784;
    --gold-soft: #a08b4f;
    --sumi: #2b2620;
    --sumi-dim: #6b6355;
    --sumi-faint: #8a8170;
    --shu: #c8443b;
    --field-border: #cdbf9d;
    --field-focus: #b89a5a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    color: var(--sumi);
    background: #ece7db;
    display: flex;
    justify-content: center;
    padding: 36px 16px 72px;
  }

  .sheet {
    width: 100%;
    max-width: 560px;
    background: var(--washi);
    border-radius: 16px;
    /* 証書らしい金の二重罫 */
    box-shadow:
      inset 0 0 0 7px var(--washi),
      inset 0 0 0 8px var(--gold),
      0 8px 30px rgba(60,50,30,0.10);
    padding: 40px 30px 34px;
  }

  header {
    position: relative;
    text-align: center;
    margin-bottom: 34px;
  }

  /* 朱印：縁之鑑定 */
  .seal {
    position: absolute;
    top: -8px;
    right: 0;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 2px solid var(--shu);
    color: var(--shu);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    font-size: 14px;
    line-height: 1.25;
    letter-spacing: 0.04em;
    text-align: center;
    transform: rotate(-8deg);
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.32em;
    color: var(--gold-soft);
    margin: 0 0 12px;
    padding-left: 0.32em;
  }

  h1 {
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "Hiragino Mincho Pro", serif;
    font-weight: 600;
    font-size: 32px;
    letter-spacing: 0.12em;
    margin: 0 0 16px;
    padding-left: 0.12em;
    color: var(--sumi);
  }

  .lead {
    font-size: 14px;
    line-height: 1.95;
    color: var(--sumi-dim);
    margin: 0;
  }

  .field { margin-bottom: 24px; }

  .field label {
    display: block;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    color: var(--sumi);
  }

  .field .hint {
    display: block;
    font-size: 12.5px;
    color: var(--sumi-faint);
    margin-bottom: 10px;
    line-height: 1.7;
  }

  input[type="text"],
  textarea {
    width: 100%;
    background: var(--washi-field);
    border: 1px solid var(--field-border);
    border-radius: 9px;
    color: var(--sumi);
    font-size: 16px; /* iOSで拡大されないよう16px */
    font-family: inherit;
    padding: 13px 15px;
    line-height: 1.7;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  textarea { resize: vertical; min-height: 92px; }

  input[type="text"]::placeholder,
  textarea::placeholder { color: #b3a98f; }

  input[type="text"]:focus,
  textarea:focus {
    outline: none;
    border-color: var(--field-focus);
    box-shadow: 0 0 0 3px rgba(184,154,90,0.18);
  }

  .cta {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #fff;
    background: var(--shu);
    border: none;
    border-radius: 11px;
    cursor: pointer;
    transition: filter 0.18s ease, transform 0.12s ease;
  }

  .cta:hover { filter: brightness(1.05); }
  .cta:active { transform: translateY(1px); }
  .cta:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }

  .note {
    margin-top: 16px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--sumi-faint);
    text-align: center;
  }

  .result {
    display: none;
    margin-top: 28px;
    padding: 22px 20px;
    background: #fbf7ec;
    border: 1px solid var(--gold);
    border-radius: 12px;
    line-height: 1.9;
    font-size: 14px;
  }

  .result.show { display: block; }

  .result h2 {
    font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    font-size: 18px;
    letter-spacing: 0.08em;
    margin: 0 0 14px;
    color: var(--shu);
  }

  .result dl { margin: 0; }
  .result dt { font-size: 12px; color: var(--sumi-faint); letter-spacing: 0.06em; }
  .result dd { margin: 2px 0 14px; color: var(--sumi); white-space: pre-wrap; }
  .result .status { margin-top: 6px; font-size: 12.5px; color: var(--sumi-dim); }

  @media (prefers-reduced-motion: reduce) {
    .cta { transition: none; }
  }

  @media (max-width: 600px) {
    .sheet { padding: 34px 22px 28px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>
  <main class="sheet">
    <header>
      <div class="seal">縁之<br>鑑定</div>
      <p class="eyebrow">縁の鑑定書</p>
      <h1>その出会いを、鑑定します</h1>
      <p class="lead">
        この出会いは、宇宙が138億年をかけて準備した必然かもしれません。<br>
        3つだけ教えてください。あなただけの鑑定書をお届けします。
      </p>
    </header>

    <div class="field">
      <label for="relation">① 相手との関係</label>
      <span class="hint">例：恋人 / 親友 / 職場の同僚 / 家族 など</span>
      <input type="text" id="relation" placeholder="例：大学時代からの親友">
    </div>

    <div class="field">
      <label for="situation">② 出会ったときの状況</label>
      <span class="hint">どこで、どんなきっかけで出会いましたか？</span>
      <textarea id="situation" placeholder="例：新歓のサークル説明会で、たまたま隣の席になった"></textarea>
    </div>

    <div class="field">
      <label for="episode">③ 印象的だったこと</label>
      <span class="hint">最初のひと言、忘れられない場面など</span>
      <textarea id="episode" placeholder="例：緊張していた私に「一緒に回ろう」と声をかけてくれた"></textarea>
    </div>

    <button class="cta" id="submit">鑑定してもらう</button>
    <p class="note">エンタメ目的のAI鑑定です。個人名など特定の情報は入れないでください。</p>

    <section class="result" id="result" aria-live="polite">
      <h2>入力を受け取りました</h2>
      <dl>
        <dt>相手との関係</dt><dd id="out-relation"></dd>
        <dt>出会ったときの状況</dt><dd id="out-situation"></dd>
        <dt>印象的だったこと</dt><dd id="out-episode"></dd>
      </dl>
      <p class="status">※ 今はここまで（画面のテスト）。次の段階で、このボタンから決済 → 鑑定へつなぎます。</p>
    </section>
  </main>

  <script>
    const btn = document.getElementById('submit');
    const result = document.getElementById('result');

    btn.addEventListener('click', function () {
      const relation  = document.getElementById('relation').value.trim();
      const situation = document.getElementById('situation').value.trim();
      const episode   = document.getElementById('episode').value.trim();

      if (!relation && !situation && !episode) {
        alert('3つのうち、どれか1つでも入力してから押してみてください。');
        return;
      }

      document.getElementById('out-relation').textContent  = relation  || '（未入力）';
      document.getElementById('out-situation').textContent = situation || '（未入力）';
      document.getElementById('out-episode').textContent   = episode   || '（未入力）';

      result.classList.add('show');
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  </script>
</body>
</html>
