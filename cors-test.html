<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make 往復テスト v2（自己診断つき）</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; line-height: 1.7; color: #222; }
  h2 { margin-bottom: 4px; }
  p.desc { color: #555; margin-top: 0; }
  button { font-size: 16px; padding: 12px 28px; cursor: pointer; border: none; border-radius: 8px; background: #c2185b; color: #fff; }
  .box { margin-top: 20px; padding: 14px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; font-size: 14px; }
  .ok { background: #e8f5e9; border: 1px solid #4caf50; }
  .ng { background: #ffebee; border: 1px solid #e53935; }
  .wait { background: #f5f5f5; border: 1px solid #bbb; }
  .env { background: #e3f2fd; border: 1px solid #64b5f6; }
</style>
</head>
<body>
  <h2>Make 往復テスト v2</h2>
  <p class="desc">ボタンを押すと2つのテストを自動で行い、結果を全部この画面に表示します。</p>
  <div id="env" class="box env"></div>
  <button id="send">テスト開始</button>
  <div id="t1" class="box wait" style="display:none"></div>
  <div id="t2" class="box wait" style="display:none"></div>
  <div id="verdict" class="box wait" style="display:none"></div>

<script>
const WEBHOOK_URL = "https://hook.eu1.make.com/5d6x8gpvn5yduo6frebsz7ybo95342lq";

// このページ自身がどこで動いているか表示
document.getElementById("env").textContent =
  "このページの動作環境: " + (location.protocol === "file:"
    ? "⚠️ file://（手元のファイル）で開いています。GitHub Pages（https）でのテストを推奨します。"
    : "✅ " + location.origin + "（https環境）");

async function runTest(el, label, options) {
  el.style.display = "block";
  el.className = "box wait";
  el.textContent = label + " 実行中…";
  try {
    const res = await fetch(WEBHOOK_URL, options);
    const text = await res.text();
    const cors = res.headers.get("access-control-allow-origin");
    el.className = "box ok";
    el.textContent = "✅ " + label + " 成功\n"
      + "HTTPステータス: " + res.status + "\n"
      + "返事の本文: " + text + "\n"
      + "Access-Control-Allow-Origin: " + (cors === null ? "（読み取れず）" : cors);
    return true;
  } catch (err) {
    el.className = "box ng";
    el.textContent = "❌ " + label + " 失敗: " + err.message;
    return false;
  }
}

document.getElementById("send").addEventListener("click", async () => {
  const t1 = document.getElementById("t1");
  const t2 = document.getElementById("t2");
  const v  = document.getElementById("verdict");
  v.style.display = "none";

  const r1 = await runTest(t1, "テスト1（GET・最小構成）", { method: "GET" });
  const r2 = await runTest(t2, "テスト2（POST・本番と同じ形）", {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ message: "ブラウザからこんにちは", time: new Date().toISOString() })
  });

  v.style.display = "block";
  if (r1 && r2) {
    v.className = "box ok";
    v.textContent = "🎉 判定: 往復成立。CORS関門突破です。この画面をスクショしてClaudeに見せてください。";
  } else if (r1 && !r2) {
    v.className = "box ng";
    v.textContent = "判定: GETは通るがPOSTが失敗。POSTの扱いに原因あり。この画面をスクショしてClaudeに見せてください。";
  } else {
    v.className = "box ng";
    v.textContent = "判定: 通信自体が出ていない可能性。動作環境の表示（上の青い枠）と合わせてスクショしてClaudeに見せてください。";
  }
});
</script>
</body>
</html>
